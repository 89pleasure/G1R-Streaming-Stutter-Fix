name: Linux App Build

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-linux-app:
    name: Build Linux AppImage and Debian package
    runs-on: ubuntu-22.04
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: linux-cargo-registry-${{ runner.os }}-${{ hashFiles('Cargo.lock', 'app/src-tauri/Cargo.lock', 'app/src-tauri/Cargo.toml', 'optimizer-core/Cargo.toml') }}
          restore-keys: |
            linux-cargo-registry-${{ runner.os }}-

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            curl \
            file \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            patchelf \
            wget

      - name: Install app dependencies
        working-directory: app
        run: npm ci

      - name: Build Tauri Linux bundles
        working-directory: app
        run: npm run build

      - name: Upload Linux bundles
        uses: actions/upload-artifact@v4
        with:
          name: g1r-optimizer-linux-x86_64
          path: |
            app/src-tauri/target/release/bundle/appimage/*.AppImage
            app/src-tauri/target/release/bundle/deb/*.deb
          if-no-files-found: error
